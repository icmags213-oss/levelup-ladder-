<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LevelUp Pickleball Ladder — Standings</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fb;color:#1a2233;line-height:1.5;padding:16px;}
.wrap{max-width:720px;margin:0 auto;}
.hero{
  position:relative;background:linear-gradient(135deg,#000 0%,#062a06 45%,#0e5a18 100%);
  border-radius:20px;padding:18px 22px;color:#fff;margin-bottom:18px;overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,.08);border:1px solid #1f2937;
}
.hero::after{
  content:"";position:absolute;right:-40px;top:-40px;width:220px;height:220px;
  background:radial-gradient(circle,#2da43a 0%,transparent 65%);opacity:.45;pointer-events:none;
}
.hero-inner{position:relative;z-index:2;display:flex;align-items:center;gap:12px;}
.brand-tile{
  width:46px;height:46px;border-radius:13px;
  background:transparent;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
  overflow:hidden;
}
.brand-tile img{width:100%;height:100%;object-fit:cover;border-radius:13px;}
.brand-eyebrow{font-size:13px;font-weight:700;color:#ffffff;letter-spacing:.04em;}
.hero-inner p{font-size:13px;color:rgba(255,255,255,.78);}
.updated{font-size:11px;color:rgba(255,255,255,.6);margin-top:8px;position:relative;z-index:2;}
.ladder-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:14px;box-shadow:0 4px 14px rgba(0,0,0,.05);border:1px solid #e8edf5;}
.ladder-heading{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:10px;font-weight:700;font-size:14px;}
.ladder-heading .tag{margin-left:auto;font-size:11px;font-weight:600;padding:3px 8px;background:rgba(0,0,0,.08);border-radius:999px;}
.row{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid #edf1f7;cursor:pointer;border-radius:8px;transition:background .12s;}
.row:hover{background:#f8fbff;}
.row:last-child{border-bottom:none;}
.rank{font-size:13px;font-weight:700;color:#697186;width:32px;text-align:right;flex-shrink:0;}
.rank.gold{color:#d4a017;}.rank.silver{color:#8896a8;}.rank.bronze{color:#b87333;}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.pname{flex:1;font-weight:600;font-size:14px;color:#1a2233;min-width:0;}
.pts{font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;}
.chev{color:#a4adc1;font-size:20px;font-weight:400;}
.empty{color:#a4adc1;font-size:13px;padding:14px;text-align:center;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;padding:40px 12px;overflow-y:auto;z-index:9999;}
.modal-card{background:#fff;border-radius:18px;width:100%;max-width:480px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.4);}
.modal-head{display:flex;align-items:center;gap:10px;padding:14px 16px;}
.modal-head .avatar{width:44px;height:44px;font-size:16px;}
.modal-name{font-weight:700;font-size:17px;color:#fff;}
.modal-sub{font-size:12px;color:rgba(255,255,255,.85);}
.modal-close{margin-left:auto;background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.35);color:#fff;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:13px;}
.modal-body{padding:16px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.stat{background:#f5f7fb;border:1px solid #edf1f7;border-radius:12px;padding:12px;}
.stat-num{font-size:22px;font-weight:700;color:#1a2233;}
.stat-cap{font-size:11px;font-weight:600;color:#697186;text-transform:uppercase;letter-spacing:.04em;margin-top:4px;}
.history{margin-top:14px;background:#fff;border:1px solid #edf1f7;border-radius:12px;overflow:hidden;}
.history-row{padding:10px 12px;border-bottom:1px solid #edf1f7;font-size:13px;}
.history-row:last-child{border-bottom:none;}
.history-row .top{display:flex;justify-content:space-between;gap:8px;font-weight:600;margin-bottom:4px;color:#1a2233;}
.history-row .meta{font-size:12px;color:#697186;}
h4{font-size:13px;color:#1a2233;margin:18px 0 8px;}
</style>
</head>

const COLORS=[
  {bg:'#E6F1FB',tx:'#0C447C'},{bg:'#E1F5EE',tx:'#085041'},{bg:'#FAEEDA',tx:'#633806'},
  {bg:'#FCEBEB',tx:'#791F1F'},{bg:'#EEE6FB',tx:'#3B2A6D'},{bg:'#FCEAF3',tx:'#7C1F4F'},
  {bg:'#EAF5FC',tx:'#1C5478'},{bg:'#F4FBE6',tx:'#3F5F0C'},{bg:'#FDF1E6',tx:'#7A4310'}
];
const LVL={upper:{label:'Upper Ladder (3.5+)',bg:'#E1F5EE',tx:'#085041'},lower:{label:'Lower Ladder (2.0–3.4)',bg:'#E6F1FB',tx:'#0C447C'}};
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function ini(name){return name.split(/\s+/).map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();}
function col(i){return COLORS[i%COLORS.length];}
function renderLadder(level,elId){
  const el=document.getElementById(elId);
  const list=DATA.players.map((p,i)=>({p,i})).filter(x=>x.p.level===level).sort((a,b)=>b.p.pts-a.p.pts);
  if(!list.length){
    el.innerHTML='<div class="ladder-card"><div class="ladder-heading" style="background:'+LVL[level].bg+';color:'+LVL[level].tx+';"><span>'+LVL[level].label+'</span></div><div class="empty">No players yet.</div></div>';
    return;
  }
  let html='<div class="ladder-card">';
  html+='<div class="ladder-heading" style="background:'+LVL[level].bg+';color:'+LVL[level].tx+';"><span>'+LVL[level].label+'</span><span class="tag">'+list.length+' player'+(list.length!==1?'s':'')+'</span></div>';
  list.forEach((entry,i)=>{
    const p=entry.p;const c=col(entry.i);
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1);
    const rankClass=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    html+='<div class="row" onclick="showPlayer(\''+p.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">';
    html+='<span class="rank '+rankClass+'">'+medal+'</span>';
    html+='<div class="avatar" style="background:'+c.bg+';color:'+c.tx+'">'+ini(p.name)+'</div>';
    html+='<span class="pname">'+esc(p.name)+'</span>';
    html+='<span class="pts" style="background:'+c.bg+';color:'+c.tx+'">'+p.pts+' pts</span>';
    html+='<span class="chev">›</span>';
    html+='</div>';
  });
  html+='</div>';
  el.innerHTML=html;
}
function showPlayer(name){
  const p=DATA.players.find(pl=>pl.name===name);
  if(!p)return;
  const s=DATA.stats[name];if(!s)return;
  const pi=DATA.players.indexOf(p);const c=col(pi);
  const lv=LVL[p.level];
  const avgChange=s.avgRankChange===null||s.avgRankChange===undefined
    ? '<span style="color:#697186;">—</span>'
    : (s.avgRankChange>0
      ? '<span style="color:#10b981;">▲ '+s.avgRankChange.toFixed(2)+'</span>'
      : s.avgRankChange<0
        ? '<span style="color:#dc2626;">▼ '+Math.abs(s.avgRankChange).toFixed(2)+'</span>'
        : '<span style="color:#697186;">±0</span>');
  const recent=(s.sessionHistory||[]).map(h=>'<div class="history-row"><div class="top"><span>'+esc(h.weekLabel||'')+' · '+esc(h.day||'')+'</span><span class="meta">'+esc(h.date||'')+'</span></div><div class="meta">'+h.wins+'W / '+h.losses+'L · <strong style="color:'+(h.points>=0?'#10b981':'#dc2626')+';">'+(h.points>=0?'+':'')+h.points+' pts</strong></div></div>').join('')||'<div class="empty">No sessions on record yet.</div>';
  document.getElementById('modal-root').innerHTML='<div class="modal" onclick="if(event.target===this)closePlayer()"><div class="modal-card"><div class="modal-head" style="background:'+c.bg+';"><div class="avatar" style="background:'+c.tx+';color:'+c.bg+'">'+ini(p.name)+'</div><div style="flex:1;min-width:0;"><div class="modal-name" style="color:'+c.tx+';">'+esc(p.name)+'</div><div class="modal-sub" style="color:'+c.tx+';opacity:.8;">'+lv.label+' · '+p.pts+' ladder pts</div></div><button class="modal-close" onclick="closePlayer()">✕</button></div><div class="modal-body"><div class="grid"><div class="stat"><div class="stat-num">'+s.sessions+'</div><div class="stat-cap">Sessions</div></div><div class="stat"><div class="stat-num">'+s.matches+'</div><div class="stat-cap">Matches</div></div><div class="stat"><div class="stat-num">'+s.wins+' <span style="font-size:13px;color:#697186;">/ '+s.losses+'</span></div><div class="stat-cap">Wins / Losses</div></div><div class="stat"><div class="stat-num">'+s.winPct+'%</div><div class="stat-cap">Win %</div></div><div class="stat"><div class="stat-num">'+s.ladderPoints+'</div><div class="stat-cap">Ladder Points</div></div><div class="stat"><div class="stat-num">'+s.ptsScored+' <span style="font-size:13px;color:#697186;">/ '+s.ptsConceded+'</span></div><div class="stat-cap">Game Pts Scored / Conceded</div></div><div class="stat" style="grid-column:1/-1;"><div class="stat-num" style="font-size:18px;">'+avgChange+'</div><div class="stat-cap">Avg Rank Change</div></div></div><h4>Recent Sessions</h4><div class="history">'+recent+'</div></div></div></div>';
}
function closePlayer(){document.getElementById('modal-root').innerHTML='';}
document.getElementById('updated').textContent=DATA.updated;
renderLadder('upper','upper-ladder');
renderLadder('lower','lower-ladder');
